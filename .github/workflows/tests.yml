name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [11, 12, 13]
        exclude:
          - php: 8.2
            laravel: 13

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}.0" "orchestra/testbench:^${{ matrix.laravel == '11' && '9' || matrix.laravel == '12' && '10' || '10' }}.0" --no-update
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
