name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.2
            laravel: 11
            testbench: 9
          - php: 8.3
            laravel: 11
            testbench: 9
          - php: 8.4
            laravel: 11
            testbench: 9
          - php: 8.2
            laravel: 12
            testbench: 10
          - php: 8.3
            laravel: 12
            testbench: 10
          - php: 8.4
            laravel: 12
            testbench: 10
          - php: 8.3
            laravel: 13
            testbench: 11
          - php: 8.4
            laravel: 13
            testbench: 11

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:^${{ matrix.laravel }}.0" "orchestra/testbench:^${{ matrix.testbench }}.0" --no-update --dev
          composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
